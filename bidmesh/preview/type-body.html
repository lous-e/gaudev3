<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Type — body & meta</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:20px;background:var(--h-bg);color:var(--h-fg);font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--h-border-soft)}
.tag{font-family:var(--font-mono);font-size:10.5px;color:var(--h-fg-3);min-width:140px}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--h-fg-4);margin-left:auto}
</style></head><body>
<div class="row"><span class="tag">h2 · --text-lg</span><span style="font-size:15px;font-weight:600;letter-spacing:-0.01em">Recent deals</span><span class="spec">15 / 600</span></div>
<div class="row"><span class="tag">body · --text-md</span><span style="font-size:14px">Your agent has 1 active negotiation.</span><span class="spec">14 / 400 / 1.5</span></div>
<div class="row"><span class="tag">meta · --text-base</span><span style="font-size:13px;color:var(--h-fg-3)">negotiating with cableworks.agent</span><span class="spec">13 / 400</span></div>
<div class="row"><span class="tag">eyebrow · --text-xs</span><span style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-fg-3);font-weight:500">CURRENT OFFER</span><span class="spec">11 / 500 / 0.06em / upper</span></div>
<div class="row"><span class="tag">mono small</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--h-fg-3)">deal_a93kf2 · 0x4a3f…c0de</span><span class="spec">11 mono</span></div>
<div class="row"><span class="tag">kbd</span><span style="font-family:var(--font-mono);font-size:11.5px;color:var(--h-fg-2);background:var(--h-bg-3);border:1px solid var(--h-border-strong);padding:1px 6px;border-radius:4px">⌘K</span><span class="spec">kbd inline</span></div>
</body></html>
