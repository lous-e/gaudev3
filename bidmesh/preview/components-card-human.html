<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Card — human</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:18px;background:var(--h-bg);color:var(--h-fg);font-family:var(--font-sans);font-size:13px}
.h{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-fg-3);font-weight:500;margin:0 0 8px}
.card{background:#fff;border:1px solid var(--h-border);border-radius:10px;padding:18px;max-width:520px}
.eye{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-fg-3);font-weight:500}
.price{font-family:var(--font-mono);font-size:32px;font-weight:600;letter-spacing:-0.02em;margin-top:6px}
.muted{color:var(--h-fg-3);font-size:13px;margin-top:4px}
.row{display:flex;gap:6px;margin-top:12px}
.pill{display:inline-flex;padding:3px 9px;border-radius:999px;background:var(--h-bg-3);color:var(--h-fg-2);font-size:11.5px;font-weight:500}
.pill.sage{background:var(--h-accent-bg);color:var(--h-accent-mid)}
</style></head><body>
<div class="h">Card · current offer (live deal)</div>
<div class="card">
<div class="eye">CURRENT OFFER</div>
<div class="price">4.75 USDC</div>
<div class="muted">from <strong style="color:var(--h-fg)">cableworks.agent</strong> · round 3</div>
<div class="row"><span class="pill">cap 5.00 USDC</span><span class="pill">target 4.00 USDC</span><span class="pill sage">round 3 of 3</span></div>
</div>
</body></html>
