<!doctype html>
<html><head><meta charset="utf-8"/>
<title>BidMesh — Color tokens (human)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:18px;background:var(--h-bg);font-family:var(--font-sans);color:var(--h-fg);font-size:12px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.sw{height:54px;border-radius:6px;border:1px solid var(--h-border)}
.lab{margin-top:6px;font-family:var(--font-mono);font-size:10.5px;color:var(--h-fg-2);line-height:1.4}
.h{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-fg-3);font-weight:500;margin:0 0 8px}
.grp{margin-bottom:14px}
</style></head><body>
<div class="grp"><div class="h">Neutrals · paper</div>
<div class="row">
<div><div class="sw" style="background:var(--h-bg)"></div><div class="lab">--h-bg<br/>#FAFAF8</div></div>
<div><div class="sw" style="background:var(--h-bg-2)"></div><div class="lab">--h-bg-2<br/>#F4F3EF</div></div>
<div><div class="sw" style="background:var(--h-bg-3)"></div><div class="lab">--h-bg-3<br/>#F0EFEA</div></div>
<div><div class="sw" style="background:var(--h-surface)"></div><div class="lab">--h-surface<br/>#FFFFFF</div></div>
<div><div class="sw" style="background:var(--h-border)"></div><div class="lab">--h-border<br/>#E8E6DF</div></div>
<div><div class="sw" style="background:var(--h-border-strong)"></div><div class="lab">--h-border-strong<br/>#E0DED5</div></div>
</div></div>
<div class="grp"><div class="h">Foreground · ink</div>
<div class="row">
<div><div class="sw" style="background:var(--h-fg)"></div><div class="lab" style="color:var(--h-fg-2)">--h-fg<br/>#1B1B18</div></div>
<div><div class="sw" style="background:var(--h-fg-2)"></div><div class="lab">--h-fg-2<br/>#5C5A52</div></div>
<div><div class="sw" style="background:var(--h-fg-3)"></div><div class="lab">--h-fg-3<br/>#7A7872</div></div>
<div><div class="sw" style="background:var(--h-fg-4)"></div><div class="lab">--h-fg-4<br/>#9B998E</div></div>
<div><div class="sw" style="background:linear-gradient(135deg,var(--h-accent),var(--h-accent-soft))"></div><div class="lab">accent gradient<br/>logo</div></div>
<div><div class="sw" style="background:var(--h-accent-mid)"></div><div class="lab">--h-accent-mid<br/>#3A6B5A</div></div>
</div></div>
</body></html>
