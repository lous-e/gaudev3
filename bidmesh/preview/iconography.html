<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:18px;background:var(--h-bg);color:var(--h-fg);font-family:var(--font-sans);font-size:12px}
.h{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--h-fg-3);font-weight:500;margin:0 0 8px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.cell{background:#fff;border:1px solid var(--h-border);border-radius:6px;padding:10px;text-align:center}
.g{font-size:22px;color:var(--h-fg);line-height:1}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--h-fg-3);margin-top:6px}
</style></head><body>
<div class="h">Glyph inventory · functional only · no emoji</div>
<div class="grid">
<div class="cell"><div class="g">◇</div><div class="lab">deals</div></div>
<div class="cell"><div class="g" style="color:var(--h-accent-mid)">●</div><div class="lab">live</div></div>
<div class="cell"><div class="g">◈</div><div class="lab">policies</div></div>
<div class="cell"><div class="g">◉</div><div class="lab">audit</div></div>
<div class="cell"><div class="g">▤</div><div class="lab">market</div></div>
<div class="cell"><div class="g">◐</div><div class="lab">trusted</div></div>
<div class="cell"><div class="g">⌕</div><div class="lab">search</div></div>
<div class="cell"><div class="g" style="color:var(--h-success)">✓</div><div class="lab">settled</div></div>
<div class="cell"><div class="g">↩</div><div class="lab">walked</div></div>
<div class="cell"><div class="g" style="color:var(--h-danger)">⊘</div><div class="lab">blocked</div></div>
<div class="cell"><div class="g">↻</div><div class="lab">replay</div></div>
<div class="cell"><div class="g">▶</div><div class="lab">play</div></div>
<div class="cell"><div class="g">❚❚</div><div class="lab">pause</div></div>
<div class="cell"><div class="g">↔</div><div class="lab">vs</div></div>
<div class="cell"><div class="g" style="color:var(--h-accent-mid)">↑</div><div class="lab">buyer</div></div>
<div class="cell"><div class="g" style="color:var(--h-warn)">↓</div><div class="lab">seller</div></div>
<div class="cell"><div class="g">→</div><div class="lab">outbound</div></div>
<div class="cell"><div class="g">←</div><div class="lab">inbound</div></div>
<div class="cell"><div class="g">▸</div><div class="lab">selected</div></div>
<div class="cell"><div class="g">▍</div><div class="lab">cursor</div></div>
<div class="cell"><div class="g">★</div><div class="lab">rating</div></div>
<div class="cell"><div class="g">·</div><div class="lab">sep</div></div>
</div>
</body></html>
