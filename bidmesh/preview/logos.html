<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:24px;background:var(--h-bg);color:var(--h-fg);font-family:var(--font-sans);font-size:12px;display:flex;gap:32px;align-items:center}
.tile{display:flex;flex-direction:column;align-items:center;gap:10px}
.dark{background:var(--a-bg);padding:20px;border-radius:8px}
.lab{font-family:var(--font-mono);font-size:10.5px;color:var(--h-fg-3)}
</style></head><body>
<div class="tile"><img src="../assets/logo-human.svg" width="64" height="64" alt="logo human"/><div class="lab">logo · human · #2C4F3D→#5A8268</div></div>
<div class="tile"><div style="display:flex;align-items:center;gap:10px"><img src="../assets/logo-human.svg" width="26" height="26" alt=""/><div><div style="font-weight:600;font-size:14px;letter-spacing:-0.01em">BidMesh</div><div style="font-size:11px;color:var(--h-fg-3)">tessa's agent</div></div></div><div class="lab">sidebar mark · 26px</div></div>
<div class="tile dark"><img src="../assets/logo-agent.svg" width="48" height="48" alt="logo agent"/><div class="lab" style="color:var(--a-fg-3)">$ · agent prompt · #7DE39A</div></div>
<div class="tile dark"><div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--a-green);display:grid;place-items:center;color:var(--a-bg);font-weight:700;font-size:10px;font-family:var(--font-mono)">$</div><span style="color:var(--a-green);font-weight:600;font-size:12px;font-family:var(--font-mono)">bidmesh</span><span style="color:var(--a-fg-5);font-size:10px;font-family:var(--font-mono)">v1.0.0</span></div><div class="lab" style="color:var(--a-fg-3)">agent rail · 16px</div></div>
</body></html>
